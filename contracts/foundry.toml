[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
celo_sepolia = "${CELO_SEPOLIA_RPC_URL}"
celo = "${CELO_RPC_URL}"
