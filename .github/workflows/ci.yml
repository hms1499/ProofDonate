name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: frontend

      - name: Lint
        run: pnpm lint
        working-directory: frontend
        env:
          NEXT_PUBLIC_PROOF_DONATE_ADDRESS: ${{ secrets.NEXT_PUBLIC_PROOF_DONATE_ADDRESS }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          NEXT_PUBLIC_PINATA_JWT: ${{ secrets.NEXT_PUBLIC_PINATA_JWT }}
          NEXT_PUBLIC_PINATA_GATEWAY: ${{ secrets.NEXT_PUBLIC_PINATA_GATEWAY }}

      - name: Type check
        run: pnpm type-check
        working-directory: frontend
        env:
          NEXT_PUBLIC_PROOF_DONATE_ADDRESS: ${{ secrets.NEXT_PUBLIC_PROOF_DONATE_ADDRESS }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          NEXT_PUBLIC_PINATA_JWT: ${{ secrets.NEXT_PUBLIC_PINATA_JWT }}
          NEXT_PUBLIC_PINATA_GATEWAY: ${{ secrets.NEXT_PUBLIC_PINATA_GATEWAY }}

      - name: Build
        run: pnpm build
        working-directory: frontend
        env:
          NEXT_PUBLIC_PROOF_DONATE_ADDRESS: ${{ secrets.NEXT_PUBLIC_PROOF_DONATE_ADDRESS }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          NEXT_PUBLIC_PINATA_JWT: ${{ secrets.NEXT_PUBLIC_PINATA_JWT }}
          NEXT_PUBLIC_PINATA_GATEWAY: ${{ secrets.NEXT_PUBLIC_PINATA_GATEWAY }}

  contracts-ci:
    name: Contracts CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        run: forge build
        working-directory: contracts

      - name: Test contracts
        run: forge test -vvv
        working-directory: contracts
